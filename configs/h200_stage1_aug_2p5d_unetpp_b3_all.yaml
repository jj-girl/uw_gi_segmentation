seed: 42
data:
  root: data/raw/uw-madison-gi-tract-image-segmentation
  train_csv: train.csv
  image_size: 384
  slice_window: 5
  crop_mode: none
  valid_fold: 0
  num_folds: 5
  num_workers: 8
  sampling: all_slices
  limit_train_samples:
  limit_valid_samples:
  limit_strategy: none
  augmentation:
    affine_prob: 0.5
    rotate_limit: 7.0
    scale_limit: 0.08
    shift_limit: 0.04
model:
  name: smp_unetplusplus_efficientnet-b3
  encoder_weights: imagenet
  in_channels: 5
  num_classes: 3
  classification_head: true
train:
  epochs: 24
  batch_size: 16
  lr: 0.0002
  min_lr: 0.000001
  weight_decay: 0.00001
  scheduler: cosine
  gradient_accumulation_steps: 1
  amp: true
  device: auto
  resume_from_checkpoint:
  early_stopping_patience: 7
  output_dir: outputs/h200_stage1_aug_2p5d_unetpp_b3_all_fold0
  ema:
    enabled: true
    decay: 0.999
loss:
  name: dice_bce
  bce_weight: 0.4
  dice_weight: 0.6
  cls_weight: 0.2
inference:
  tta: true
  batch_size: 16
postprocess:
  mask_thresholds: [0.30, 0.40, 0.30]
  cls_thresholds: [0.5, 0.5, 0.5]
  min_area: [24, 24, 24]
