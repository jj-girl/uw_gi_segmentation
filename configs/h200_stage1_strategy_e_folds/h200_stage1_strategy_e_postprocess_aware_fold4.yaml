seed: 42
data:
  root: data/raw/uw-madison-gi-tract-image-segmentation
  train_csv: train.csv
  image_size: 384
  slice_window: 5
  crop_mode: none
  valid_fold: 4
  num_folds: 5
  num_workers: 8
  sampling: all_slices
  limit_train_samples: null
  limit_valid_samples: null
  limit_strategy: none
model:
  name: smp_unetplusplus_efficientnet-b3
  encoder_weights: imagenet
  in_channels: 5
  num_classes: 3
  classification_head: true
train:
  epochs: 20
  batch_size: 16
  lr: 0.0002
  min_lr: 1.0e-06
  weight_decay: 1.0e-05
  scheduler: cosine
  gradient_accumulation_steps: 1
  amp: true
  device: auto
  resume_from_checkpoint: null
  early_stopping_patience: 6
  output_dir: outputs/h200_stage1_strategy_e_postprocess_aware_fold4
  ema:
    enabled: true
    decay: 0.999
  postprocess_eval:
    enabled: true
loss:
  name: dice_bce
  bce_weight: 0.4
  dice_weight: 0.6
  cls_weight: 0.2
inference:
  tta: true
  batch_size: 16
postprocess:
  mask_thresholds:
  - 0.25
  - 0.25
  - 0.25
  cls_thresholds:
  - 0.9
  - 0.9
  - 0.9
  min_area:
  - 16
  - 96
  - 192
  z_min_run:
  - 3
  - 3
  - 2
  min_volume:
  - 0
  - 0
  - 0
  keep_largest_component:
  - false
  - false
  - false
  component_connectivity: 1
