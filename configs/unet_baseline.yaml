seed: 42
data:
  root: data/raw/uw-madison-gi-tract-image-segmentation
  train_csv: train.csv
  image_size: 256
  valid_fold: 0
  num_folds: 5
  num_workers: 2
model:
  name: unet_small
  in_channels: 1
  num_classes: 3
train:
  epochs: 5
  batch_size: 8
  lr: 0.0003
  weight_decay: 0.00001
  amp: true
  device: auto
  output_dir: outputs/unet_baseline
loss:
  bce_weight: 0.5
  dice_weight: 0.5

