seed: 42
data:
  root: data/raw/uw-madison-gi-tract-image-segmentation
  train_csv: train.csv
  image_size: 416
  slice_window: 5
  crop_mode: foreground
  crop_margin: 12
  valid_fold: 0
  num_folds: 5
  num_workers: 8
  sampling: positive_slices_only
  limit_train_samples:
  limit_valid_samples:
  limit_strategy: none
model:
  name: smp_unetplusplus_efficientnet-b5
  encoder_weights: imagenet
  in_channels: 5
  num_classes: 3
  classification_head: false
train:
  epochs: 20
  batch_size: 8
  lr: 0.0001
  min_lr: 0.000001
  weight_decay: 0.00001
  scheduler: cosine
  gradient_accumulation_steps: 1
  amp: true
  device: auto
  resume_from_checkpoint:
  early_stopping_patience: 6
  output_dir: outputs/h200_stage3_2p5d_unetpp_b5_positive_refine_fold0
  ema:
    enabled: true
    decay: 0.999
loss:
  name: focal_tversky
  tversky_weight: 1.0
  tversky_alpha: 0.3
  tversky_beta: 0.7
  focal_tversky_gamma: 0.75
  cls_weight: 0.0
inference:
  tta: true
  batch_size: 8
postprocess:
  mask_thresholds: [0.45, 0.45, 0.45]
  cls_thresholds: [0.0, 0.0, 0.0]
  min_area: [24, 24, 24]

